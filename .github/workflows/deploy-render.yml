name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  notify-deploy:
    name: Notify Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deployment notification
        run: |
          echo "🚀 Code pushed to main branch"
          echo "📦 Render.com will automatically deploy the changes"
          echo "⏳ Please check Render dashboard for deployment status"
          echo ""
          echo "Backend: Check Web Service status"
          echo "Frontend: Check Static Site status"
